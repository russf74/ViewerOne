; DIYmalls ESP32-2432028R — ILI9341 240×320 (LovyanGFX, same wiring as display-pinout-scan profiles 1–2)
; ViewerOne PC → USB serial @ 115200, JSON: {"t":"...","c":"...","l":true}
;
;   pio run -e esp32-diy8-ili9341 -t upload --upload-port COM4
;   See README.md for full Windows one-liner (Python -m platformio).
;
; Fallbacks:
;   -e esp32-diy8-ili9341-slow   — 20 MHz SPI (like pinout profile 1)
;   -e esp32-diy8-ili9341-inv    — panel invert

[platformio]
src_dir = src
default_envs = esp32-diy8-ili9341

[env:esp32-diy8-ili9341]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_deps =
  lovyan03/LovyanGFX@^1.2.19
  bblanchon/ArduinoJson @ ^7.2.0
build_flags =
  -D CORE_DEBUG_LEVEL=0

[env:esp32-diy8-ili9341-slow]
extends = env:esp32-diy8-ili9341
build_flags =
  ${env:esp32-diy8-ili9341.build_flags}
  -D VIEWERONE_TFT_SLOW_SPI

[env:esp32-diy8-ili9341-inv]
extends = env:esp32-diy8-ili9341
build_flags =
  ${env:esp32-diy8-ili9341.build_flags}
  -D VIEWERONE_TFT_INVERSION
