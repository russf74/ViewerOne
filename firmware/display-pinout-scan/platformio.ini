; Standalone TFT pinout scanner — cycles ILI9341 SPI profiles (see src/main.cpp).
; Not part of ViewerOne; use this to find which profile number first shows pixels.
;
;   pio run -t upload --upload-port COM4
;   pio device monitor --baud 115200

[platformio]
default_envs = esp32-display-scan

[env:esp32-display-scan]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_deps = lovyan03/LovyanGFX@^1.2.19
